<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Herencia css</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://db.onlinewebfonts.com/c/0f892d006a9de06a6af78558ae7caed8?family=Persona+5+Menu+Font+Prototype" rel="stylesheet"> 
</head>
<body>

  <header class="main-header">
    <h1>Guild Registry</h1>
  </header>

<section class="gallery">
  <div class="card">
    <img src="https://picsum.photos/400/300" alt="art">
    <div class="info">
      <h2>Arcane Construct</h2>
      <p>Prototype unit.</p>
    </div>
  </div>
</section>

  <section class="container">
    <div class="card">
      <span class="badge">Master</span>
      <h2>Arath</h2>
      <p>Vedalken Artificer and mentor.</p>
      <button class="info-btn">More Info</button>
          <div class="tooltip">Specializes in arcane constructs.</div>

    </div>
  </section>

  <footer class="main-footer">
    <p>2026 Arcane Archives</p>
  </footer>

</body>
</html>
